<div class="container mt-4">
  <div class="row">
    <!-- استخدام اللوب لعرض مصفوفة الطلاب -->
    @for (item of students; track item.id) {
      <div class="col-md-4 mb-3">
        <div class="card">
          <!-- استخدام Property Binding [src] لعرض الصورة -->
          <img [src]="item.photoUrl" class="card-img-top" alt="student photo">
          <div class="card-body">
            <!-- استخدام Interpolation {{ }} لعرض الاسم والسن -->
            <h5 class="card-title">{{ item.name }}</h5>
            <p class="card-text">Age: {{ item.age }}</p>
            <button class="btn btn-primary">View Details</button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
